<!DOCTYPE html>
<html>
<head>
<title>Screaming Potato</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap');

:root {
    --potato: #D4A96A; --potato-dark: #8E6D45; --potato-light: #E8C48A;
    --potato-shadow: #B8894E; --potato-highlight: #F0D4A0;
    --bg: #fdf2e9; --text: #5d4037;
    --orange: #e67e22; --orange-dark: #d35400;
    --green: #2ecc71; --red: #e74c3c; --gold: #f1c40f;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100vh; background: var(--bg); color: var(--text);
    font-family: 'Nunito', sans-serif; overflow: hidden; user-select: none;
    background-image:
        radial-gradient(circle at 15% 85%, #f9d5a7 0%, transparent 35%),
        radial-gradient(circle at 85% 15%, #fce5cc 0%, transparent 35%),
        radial-gradient(circle at 50% 50%, #fef8f2 0%, transparent 60%);
}

/* ── Draggable sponge ── */
#sponge {
    width: 56px; height: 40px; background: #ffeb3b; border-radius: 10px;
    position: absolute; z-index: 100;
    border: 3px solid #fbc02d; box-shadow: 3px 4px 0 rgba(0,0,0,0.15);
    background-image: repeating-linear-gradient(45deg, transparent, transparent 4px, rgba(0,0,0,0.05) 4px, rgba(0,0,0,0.05) 8px);
    cursor: grab; user-select: none;
    transition: background 0.3s, border-color 0.3s, transform 0.25s cubic-bezier(0.34,1.56,0.64,1), left 0.25s cubic-bezier(0.34,1.56,0.64,1), top 0.25s cubic-bezier(0.34,1.56,0.64,1);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.3rem;
}
#sponge::after { content: '🧽'; font-size: 1.4rem; }
#sponge.dragging { cursor: grabbing; transition: none; transform: scale(1.15) rotate(-8deg); box-shadow: 5px 6px 12px rgba(0,0,0,0.2); }
#sponge.on-potato { transform: scale(1.1) rotate(5deg); box-shadow: 2px 2px 0 rgba(0,0,0,0.1); }
#sponge.gold-brush  { background: linear-gradient(135deg,#f1c40f,#e67e22); border-color:#d4a017; }
#sponge.power-wash  { background: linear-gradient(135deg,#3498db,#1abc9c); border-color:#1a8fc1; }

/* ── Layout ── */
#game { display:flex; flex-direction:column; align-items:center; gap:10px; width:100%; max-width:480px; padding:0 14px; }

/* ── Stats bar ── */
#stats-bar {
    width:100%; display:flex; justify-content:space-around;
    background:white; padding:10px 8px; border-radius:20px;
    box-shadow: 0 5px 0 #e0c9b0, 0 0 0 3px var(--potato-dark);
}
.stat-box { text-align:center; flex:1; }
.stat-label { font-size:0.58rem; letter-spacing:1px; opacity:0.7; text-transform:uppercase; }
.stat-val { display:block; font-size:1.05rem; color:var(--orange-dark); font-family:'Fredoka One',cursive; }

/* ── Stage ── */
#stage {
    position:relative; width:280px; height:280px;
    display:flex; align-items:center; justify-content:center;
}

/* potato drop shadow on ground */
#potato-shadow {
    position:absolute; bottom:18px; left:50%; transform:translateX(-50%);
    width:100px; height:18px; background:rgba(141,109,69,0.25);
    border-radius:50%; filter:blur(6px);
    transition:width 0.1s, opacity 0.1s;
}

/* wrapper handles squish so SVG size stays stable */
#potato-wrap {
    position:relative; display:flex; align-items:center; justify-content:center;
    transform-origin:center bottom;
    transition: width 0.5s cubic-bezier(0.34,1.56,0.64,1), height 0.5s cubic-bezier(0.34,1.56,0.64,1);
}
#potato-svg {
    width:100%; height:100%;
    filter: drop-shadow(0 6px 10px rgba(141,109,69,0.3));
    transform-origin: center bottom;
}

/* ── Pet squish ── */
.squish {
    animation: squish 0.45s cubic-bezier(0.36,0.07,0.19,0.97) forwards !important;
}
@keyframes squish {
    0%   { transform: scaleX(1)    scaleY(1); }
    18%  { transform: scaleX(1.35) scaleY(0.65); }
    35%  { transform: scaleX(0.82) scaleY(1.18); }
    52%  { transform: scaleX(1.12) scaleY(0.9); }
    68%  { transform: scaleX(0.96) scaleY(1.06); }
    100% { transform: scaleX(1)    scaleY(1); }
}

/* ── Mood animations (applied to wrap) ── */
.mood-wiggle { animation: mwiggle 1.3s ease-in-out infinite alternate; }
.mood-panic  { animation: mshake 0.07s infinite; }
.mood-idle   { animation: midle 2.5s ease-in-out infinite; }
.mood-ascend { animation: mascend 2.8s ease-in-out infinite; }

@keyframes mwiggle  { from{transform:rotate(-4deg) translateY(0)} to{transform:rotate(4deg) translateY(-4px)} }
@keyframes mshake   { 0%{transform:translate(3px,2px) rotate(2deg)} 33%{transform:translate(-3px,-2px) rotate(-2deg)} 66%{transform:translate(3px,-2px) rotate(1deg)} }
@keyframes midle    { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
@keyframes mascend  { 0%,100%{transform:translateY(0) rotate(-3deg) scale(1)} 50%{transform:translateY(-18px) rotate(3deg) scale(1.04)} }

/* ── Sweat drop (panic building) ── */
.sweat {
    position:absolute; top:30%; right:-8px;
    font-size:1.1rem; pointer-events:none;
    animation: sweat-drip 1.2s ease-in infinite;
}
@keyframes sweat-drip {
    0%   { opacity:0; transform:translateY(-4px); }
    20%  { opacity:1; }
    100% { opacity:0; transform:translateY(20px); }
}

/* ── Floating feedback ── */
.floaty {
    position:fixed; pointer-events:none; font-family:'Fredoka One',cursive;
    font-size:1.15rem; font-weight:bold; z-index:300;
    animation: floaty 0.95s ease-out forwards;
}
@keyframes floaty {
    0%   { opacity:1; transform:translateY(0) scale(1.1); }
    50%  { opacity:1; transform:translateY(-45px) scale(1.2); }
    100% { opacity:0; transform:translateY(-75px) scale(0.85); }
}

/* ── Burst particle ── */
.burst-dot {
    position:fixed; pointer-events:none; border-radius:50%;
    transform:translate(-50%,-50%);
    animation: burst 0.65s ease-out forwards;
}
@keyframes burst {
    to { opacity:0; transform:translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(0.3); }
}

/* ── Heart pop on pet ── */
.heart-pop {
    position:fixed; pointer-events:none; font-size:1.4rem;
    animation: heart-rise 0.8s ease-out forwards; z-index:300;
}
@keyframes heart-rise {
    0%   { opacity:1; transform:translate(-50%,-50%) scale(0.5); }
    40%  { opacity:1; transform:translate(-50%,-80%) scale(1.2); }
    100% { opacity:0; transform:translate(calc(-50% + var(--drift)), -140%) scale(0.8); }
}

/* ── Gauges ── */
#gauges { width:100%; display:flex; flex-direction:column; gap:7px; }
.gauge-row { display:flex; align-items:center; gap:8px; }
.gauge-label { font-size:0.62rem; letter-spacing:1px; width:78px; text-align:right; opacity:0.75; transition:color 0.3s; }
.gauge-bg {
    flex:1; height:18px; background:#e8ddd3; border-radius:10px;
    border:2px solid var(--potato-dark); overflow:hidden; position:relative;
}
.gauge-fill { height:100%; border-radius:8px; transition:background 0.4s; }
#fill-attn    { background:#2ecc71; }
#fill-hunger  { background:#e67e22; }
#fill-hygiene { background:#3498db; }
#fill-content { background:linear-gradient(90deg,#f1c40f,#e67e22); }

/* attention zone tints */
#attn-rage    { position:absolute;left:0;   width:30%;height:100%;background:rgba(231,76,60,0.15);  border-radius:8px 0 0 8px; }
#attn-content { position:absolute;left:30%; width:40%;height:100%;background:rgba(46,204,113,0.12); }
#attn-panic   { position:absolute;left:70%; width:30%;height:100%;background:rgba(142,68,173,0.15); border-radius:0 8px 8px 0; }
#attn-div1    { position:absolute;left:30%;width:0;height:100%;border-left:2px dashed rgba(255,255,255,0.55); }
#attn-div2    { position:absolute;left:70%;width:0;height:100%;border-left:2px dashed rgba(255,255,255,0.55); }

/* ── Unlock ── */
#unlock-banner {
    display:none; background:#fff9e6; border:2px solid #f1c40f;
    border-radius:14px; padding:7px 16px; text-align:center;
    font-family:'Fredoka One',cursive; font-size:0.95rem; color:#d35400;
    box-shadow:0 3px 0 #e0c9b0; width:100%;
    animation: pop 0.4s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes pop { from{transform:scale(0.7);opacity:0} to{transform:scale(1);opacity:1} }

#unlocks-panel {
    width:100%; background:white; border-radius:16px;
    padding:8px 12px; box-shadow:0 4px 0 #e0c9b0,0 0 0 2px var(--potato-dark);
    display:flex; flex-direction:column; gap:4px;
}
.unlocks-title { font-size:0.6rem; letter-spacing:1px; opacity:0.6; text-transform:uppercase; text-align:center; }
#unlocks-list  { display:flex; gap:6px; flex-wrap:wrap; justify-content:center; min-height:28px; align-items:center; }
.unlock-chip {
    background:#fff9e6; border:2px solid #f1c40f; border-radius:20px;
    padding:2px 10px; font-size:0.75rem; font-family:'Fredoka One',cursive;
    color:#d35400; animation:pop 0.4s cubic-bezier(0.34,1.56,0.64,1);
}

/* ── Text ── */
#warning-text { font-family:'Fredoka One',cursive; font-size:0.85rem; color:#e74c3c; min-height:1.2rem; text-align:center; }
#mood-text    { font-family:'Fredoka One',cursive; font-size:1.3rem; text-align:center; min-height:1.8rem; transition:color 0.3s; }
#hint         { font-size:0.68rem; opacity:0.5; letter-spacing:0.5px; text-align:center; }

/* ── Controls ── */
#controls { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; }
button {
    padding:10px 18px; border-radius:50px; border:none; color:white;
    font-weight:900; cursor:pointer; font-size:0.9rem;
    font-family:'Fredoka One',cursive; letter-spacing:0.5px;
    transition:transform 0.1s, box-shadow 0.1s, opacity 0.2s;
}
button:active { transform:translateY(3px); }
button:disabled { opacity:0.42; cursor:not-allowed; transform:none !important; }
#btn-fries  { background:#e67e22; box-shadow:0 4px 0 #d35400; }
#btn-fries:active  { box-shadow:0 1px 0 #d35400; }
#btn-burger { background:#c0392b; box-shadow:0 4px 0 #922b21; display:none; }
#btn-burger:active { box-shadow:0 1px 0 #922b21; }
#btn-pizza  { background:#8e44ad; box-shadow:0 4px 0 #6c3483; display:none; }
#btn-pizza:active  { box-shadow:0 1px 0 #6c3483; }
#btn-reset  { background:#7f8c8d; box-shadow:0 4px 0 #636e72; display:none; }
#btn-reset:active  { box-shadow:0 1px 0 #636e72; }

/* ── Overlay ── */
#overlay {
    display:none; position:fixed; inset:0;
    background:rgba(253,242,233,0.94);
    align-items:center; justify-content:center; flex-direction:column;
    z-index:200; backdrop-filter:blur(5px); gap:14px;
}
#overlay.show { display:flex; animation:fadeIn 0.5s ease; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
#overlay h1 { font-family:'Fredoka One',cursive; font-size:2.1rem; text-align:center; max-width:340px; }
#overlay p  { font-size:1rem; opacity:0.8; text-align:center; max-width:290px; }

/* SVG hidden by default */
#acc-baby,#acc-toddler,#acc-teen,#acc-adult,#acc-elder,
#acc-sunglasses,#mad-brows,#halo,#stars { display:none; }
</style>
</head>
<body>

<div id="overlay">
    <h1 id="overlay-title">🌟</h1>
    <p id="overlay-msg"></p>
    <button onclick="resetGame()" style="margin-top:8px;background:#e67e22;box-shadow:0 5px 0 #d35400;">PLAY AGAIN</button>
</div>

<div id="game">

    <div id="stats-bar">
        <div class="stat-box"><div class="stat-label">Stage</div><span id="val-age" class="stat-val">Baby</span></div>
        <div class="stat-box"><div class="stat-label">Level</div><span id="val-lvl" class="stat-val">1/5</span></div>
        <div class="stat-box"><div class="stat-label">XP</div><span id="val-xp" class="stat-val">0</span></div>
    </div>

    <div id="stage">
        <div id="potato-shadow"></div>
        <!-- Sponge lives here, dragged onto potato to clean -->
        <div id="sponge" style="right:4px;bottom:28px;"></div>

        <div id="potato-wrap" style="width:150px;height:150px;" onclick="pet(event)">
        <svg id="potato-svg" viewBox="0 0 220 260">

            <!-- ══ HALO ══ -->
            <ellipse id="halo" cx="110" cy="18" rx="50" ry="13" stroke="#f1c40f" stroke-width="5" fill="none" opacity="0.9"/>

            <!-- ══ WIN STARS ══ -->
            <g id="stars">
                <text x="8"   y="55"  font-size="22">⭐</text>
                <text x="172" y="65"  font-size="18">✨</text>
                <text x="14"  y="230" font-size="16">⭐</text>
                <text x="172" y="232" font-size="22">✨</text>
            </g>

            <!-- ══ BODY — rounder, more organic potato shape ══ -->
            <!-- main body -->
            <path id="body"
                fill="#D4A96A" stroke="#8E6D45" stroke-width="5" stroke-linejoin="round"
                d="M55,75
                   C52,38 90,22 110,22
                   C130,22 168,38 165,75
                   C168,108 178,165 168,205
                   C158,245 62,245 52,205
                   C42,165 52,108 55,75 Z"/>

            <!-- body highlight — gives it roundness -->
            <path fill="var(--potato-highlight)" opacity="0.45"
                d="M78,42 C72,35 90,26 108,26 C124,26 138,32 140,42 C128,38 92,38 78,42 Z"/>
            <ellipse fill="var(--potato-highlight)" opacity="0.25" cx="88" cy="85" rx="16" ry="22"/>

            <!-- natural potato bumps (eyes/spots on a real potato) -->
            <g fill="#B8894E" opacity="0.55">
                <ellipse cx="68"  cy="68"  rx="6"  ry="4"  transform="rotate(-20,68,68)"/>
                <ellipse cx="158" cy="88"  rx="5"  ry="3.5"transform="rotate(15,158,88)"/>
                <ellipse cx="60"  cy="188" rx="5.5"ry="3.5"transform="rotate(10,60,188)"/>
                <ellipse cx="155" cy="200" rx="7"  ry="4.5"transform="rotate(-10,155,200)"/>
                <ellipse cx="110" cy="228" rx="6"  ry="3.5"/>
            </g>

            <!-- bottom ambient shadow on body -->
            <ellipse fill="#8E6D45" opacity="0.12" cx="110" cy="225" rx="55" ry="12"/>

            <!-- ══ DIRT ══ -->
            <g id="dirt" opacity="0" fill="#7d5a3c">
                <circle cx="68"  cy="62"  r="9"/>
                <circle cx="158" cy="185" r="11"/>
                <circle cx="55"  cy="205" r="7"/>
                <circle cx="152" cy="82"  r="6"/>
                <circle cx="110" cy="238" r="5"/>
            </g>

            <!-- ══ BLUSH ══ -->
            <ellipse id="cheek-l" fill="#ffb3c6" opacity="0" cx="68"  cy="155" rx="20" ry="13"/>
            <ellipse id="cheek-r" fill="#ffb3c6" opacity="0" cx="152" cy="155" rx="20" ry="13"/>

            <!-- ══ ANGRY BROWS ══ -->
            <g id="mad-brows" stroke="#c0392b" stroke-width="4.5" fill="none" stroke-linecap="round">
                <path d="M62 100 L90 118"/>
                <path d="M158 100 L130 118"/>
            </g>

            <!-- ══ EYES — bigger, rounder, cuter ══ -->
            <g id="eyes">
                <!-- eye whites (large soft circles) -->
                <circle cx="85"  cy="130" r="20" fill="white"/>
                <circle cx="135" cy="130" r="20" fill="white"/>
                <!-- subtle eye shadow at top -->
                <path fill="rgba(0,0,0,0.07)" d="M65,122 Q85,112 105,122 Q85,118 65,122Z"/>
                <path fill="rgba(0,0,0,0.07)" d="M115,122 Q135,112 155,122 Q135,118 115,122Z"/>
                <!-- irises -->
                <circle id="eye-l" cx="85"  cy="132" r="13" fill="#3a2a1a"/>
                <circle id="eye-r" cx="135" cy="132" r="13" fill="#3a2a1a"/>
                <!-- primary shine -->
                <circle cx="80"  cy="125" r="5" fill="white"/>
                <circle cx="130" cy="125" r="5" fill="white"/>
                <!-- tiny secondary shine -->
                <circle cx="92"  cy="138" r="2.5" fill="rgba(255,255,255,0.5)"/>
                <circle cx="142" cy="138" r="2.5" fill="rgba(255,255,255,0.5)"/>
            </g>

            <!-- ══ MOUTH ══ -->
            <path id="mouth" d="M88 170 Q110 186 132 170"
                fill="none" stroke="#5d4037" stroke-width="5" stroke-linecap="round"/>

            <!-- ══ STAGE ACCESSORIES ══ -->

            <!-- LVL 1 BABY: cute nappy/diaper -->
            <g id="acc-baby">
                <path fill="white" stroke="#b8d4ee" stroke-width="2.5"
                    d="M55,215 Q68,198 110,202 Q152,198 165,215 L162,244 Q136,258 110,260 Q84,258 58,244 Z"/>
                <rect fill="#b8d4ee" x="55" y="213" width="110" height="11" rx="6"/>
                <circle fill="#e74c3c" cx="74"  cy="219" r="6"/>
                <line x1="74"  y1="219" x2="74"  y2="230" stroke="#aaa" stroke-width="2.5"/>
                <circle fill="#3498db" cx="146" cy="219" r="6"/>
                <line x1="146" y1="219" x2="146" y2="230" stroke="#aaa" stroke-width="2.5"/>
            </g>

            <!-- LVL 2 TODDLER: baby tooth -->
            <g id="acc-toddler">
                <rect fill="white" stroke="#ccc" stroke-width="1.5" x="96" y="174" width="18" height="22" rx="5"/>
                <line x1="96" y1="183" x2="114" y2="183" stroke="#eee" stroke-width="1.5"/>
            </g>

            <!-- LVL 3 TEEN: backwards snapback + pimple -->
            <g id="acc-teen">
                <path fill="#2c3e6b" stroke="#1a2540" stroke-width="2"
                    d="M62,72 Q110,30 158,72 L155,84 Q110,46 65,84 Z"/>
                <!-- snapback sticker detail -->
                <rect fill="#e74c3c" x="100" y="48" width="20" height="10" rx="3"/>
                <text x="102" y="57" font-size="7" fill="white">YOLO</text>
                <!-- backwards brim -->
                <path fill="#1a2540" d="M52,74 Q36,77 34,87 Q52,89 65,84 Z"/>
                <!-- pimple -->
                <circle fill="#e74c3c" cx="160" cy="148" r="7"/>
                <circle fill="#ffb6b6" cx="158" cy="145" r="2.5"/>
            </g>

            <!-- LVL 4 ADULT: crisp necktie -->
            <g id="acc-adult">
                <polygon fill="#1a5276" stroke="#154360" stroke-width="1.5"
                    points="104,205 116,205 120,238 110,252 100,238"/>
                <polygon fill="#154360"
                    points="103,205 117,205 115,215 110,217 105,215"/>
                <line x1="107" y1="223" x2="113" y2="223" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
                <line x1="106" y1="231" x2="114" y2="231" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
            </g>

            <!-- LVL 5 ELDER: full grandpa kit -->
            <g id="acc-elder">
                <!-- big fluffy white mustache -->
                <path fill="white" stroke="#ccc" stroke-width="1"
                    d="M74 164 Q88 148 110 162 Q132 148 146 164
                       Q138 174 124 168 Q110 162 96 168 Q82 174 74 164 Z"/>
                <!-- reading glasses -->
                <circle fill="none" stroke="#8E6D45" stroke-width="3" cx="85"  cy="130" r="22"/>
                <circle fill="none" stroke="#8E6D45" stroke-width="3" cx="135" cy="130" r="22"/>
                <line x1="107" y1="130" x2="113" y2="130" stroke="#8E6D45" stroke-width="3"/>
                <line x1="63"  cy="130" x1="63"  y1="125" x2="50"  y2="128" stroke="#8E6D45" stroke-width="3"/>
                <line x1="157" y1="125" x2="170" y2="128" stroke="#8E6D45" stroke-width="3"/>
                <!-- wrinkle lines -->
                <path stroke="#B8894E" stroke-width="2" fill="none" stroke-linecap="round" d="M50 115 Q46 122 50 128"/>
                <path stroke="#B8894E" stroke-width="2" fill="none" stroke-linecap="round" d="M170 115 Q174 122 170 128"/>
                <path stroke="#B8894E" stroke-width="1.5" fill="none" stroke-linecap="round" d="M82 85 Q110 78 138 85"/>
                <!-- cane -->
                <line x1="168" y1="210" x2="186" y2="270" stroke="#8E6D45" stroke-width="7" stroke-linecap="round"/>
                <path fill="none" stroke="#8E6D45" stroke-width="7" stroke-linecap="round"
                    d="M186,270 Q198,270 198,258 Q198,246 186,246"/>
            </g>

            <!-- COSMETIC: Sunglasses -->
            <g id="acc-sunglasses">
                <rect fill="#111827" stroke="#f1c40f" stroke-width="2.5" x="62"  y="116" width="46" height="28" rx="12"/>
                <rect fill="#111827" stroke="#f1c40f" stroke-width="2.5" x="112" y="116" width="46" height="28" rx="12"/>
                <line x1="108" y1="130" x2="112" y2="130" stroke="#f1c40f" stroke-width="2.5"/>
                <line x1="62"  y1="130" x2="46"  y2="133" stroke="#f1c40f" stroke-width="2.5" stroke-linecap="round"/>
                <line x1="158" y1="130" x2="174" y2="133" stroke="#f1c40f" stroke-width="2.5" stroke-linecap="round"/>
                <!-- lens sheen -->
                <path fill="rgba(255,255,255,0.12)" d="M66,119 Q85,115 105,119 Q85,117 66,119Z"/>
                <path fill="rgba(255,255,255,0.12)" d="M116,119 Q135,115 155,119 Q135,117 116,119Z"/>
            </g>

        </svg>
        </div><!-- end potato-wrap -->
    </div>

    <div id="gauges">
        <div class="gauge-row">
            <div class="gauge-label" id="attn-label" style="color:#27ae60">CONTENT</div>
            <div class="gauge-bg">
                <div id="attn-rage"></div>
                <div id="attn-content"></div>
                <div id="attn-panic"></div>
                <div id="attn-div1"></div>
                <div id="attn-div2"></div>
                <div id="fill-attn" class="gauge-fill" style="width:50%;position:relative;z-index:1;background:#2ecc71"></div>
            </div>
        </div>
        <div class="gauge-row">
            <div class="gauge-label">HUNGER</div>
            <div class="gauge-bg"><div id="fill-hunger" class="gauge-fill" style="width:100%"></div></div>
        </div>
        <div class="gauge-row">
            <div class="gauge-label">HYGIENE</div>
            <div class="gauge-bg"><div id="fill-hygiene" class="gauge-fill" style="width:100%"></div></div>
        </div>
        <div class="gauge-row" id="content-row" style="display:none">
            <div class="gauge-label" style="color:#f1c40f">⏳ SURVIVE</div>
            <div class="gauge-bg" style="border-color:#c9a227;">
                <div id="fill-content" class="gauge-fill" style="width:0%;background:linear-gradient(90deg,#f1c40f,#ffe57f);"></div>
            </div>
            <div id="elder-timer" style="font-family:'Fredoka One',cursive;font-size:0.85rem;color:#c9a227;min-width:28px;text-align:left;"></div>
        </div>
    </div>

    <div id="unlock-banner"></div>
    <div id="unlocks-panel">
        <div class="unlocks-title">🔓 Unlocks</div>
        <div id="unlocks-list"><span style="opacity:0.35;font-size:0.75rem;">Level up to unlock items!</span></div>
    </div>

    <div id="warning-text"></div>
    <div id="mood-text">HELLO, FRIEND!</div>
    <div id="hint">CLICK to pet · Sponge to wash · FEED to eat</div>

    <div id="controls">
        <button id="btn-fries"  onclick="doFeed(event,'fries')">🍟 FRIES</button>
        <button id="btn-burger" onclick="doFeed(event,'burger')">🥔 RAW SPUD</button>
        <button id="btn-pizza"  onclick="doFeed(event,'pizza')">🥣 MASH</button>
        <button id="btn-reset"  onclick="resetGame()">🌱 NEW SEED</button>
    </div>

</div>

<script>
// ── Config ───────────────────────────────────────────────────────────────────
const TICK_MS       = 100;
const DECAY_ATTN    = 0.38;
const DECAY_HUNGER  = 0.55;
const DECAY_HYGIENE = 0.30;
const PANIC_LIMIT   = 150;
const MAD_LIMIT     = 150;
const SOOTHE_RATE   = 3;
const WIN_TICKS     = 600; // 60 seconds at level 5 to win

const FOODS = {
    fries:  { emoji:'🍟', label:'FRIES',  restore:32, cooldown:50 },
    burger: { emoji:'🥔', label:'RAW SPUD', restore:55, cooldown:45 },
    pizza:  { emoji:'🥣', label:'MASH',   restore:80, cooldown:70 },
};
const BRUSH_TIERS = [
    { name:'Sponge',     restore:1.2, cls:'' },
    { name:'Gold Brush', restore:2.5, cls:'gold-brush' },
    { name:'Power Wash', restore:5.0, cls:'power-wash' },
];
const LEVEL_UNLOCKS = {
    2: [
        { id:'burger',    label:'🥔 Raw Spud',  type:'food'     },
        { id:'goldbru',   label:'✨ Gold Brush', type:'brush',   tier:1 },
    ],
    3: [{ id:'pizza',     label:'🥣 Mash',       type:'food' }],
    4: [
        { id:'sunglass',  label:'😎 Sunglasses', type:'cosmetic' },
        { id:'powerwash', label:'💦 Power Wash', type:'brush',   tier:2 },
    ],
};

const AGES       = ["Baby","Toddler","Teen","Adult","Elder"];
const XP_PER_LVL = [0, 70, 160, 280, 420];
const STAGE_ACC  = ["acc-baby","acc-toddler","acc-teen","acc-adult","acc-elder"];

// ── State ────────────────────────────────────────────────────────────────────
let state = {
    attn:50, hunger:100, hygiene:100, content:0, xp:0, lvl:1,
    isDead:false, hasWon:false, scrubbing:false,
    petCooldown:0,
    foodCooldowns:{ fries:0, burger:0, pizza:0 },
    panicTicks:0, madTicks:0,
    brushTier:0, sunglassesOn:false, unlockedIds:[],
    elderTicks:0,
};

// ── DOM refs ─────────────────────────────────────────────────────────────────
const potatoWrap  = document.getElementById('potato-wrap');
const potatoSvg   = document.getElementById('potato-svg');
const potatoShad  = document.getElementById('potato-shadow');
const sponge      = document.getElementById('sponge');
const brows       = document.getElementById('mad-brows');
const halo        = document.getElementById('halo');
const stars       = document.getElementById('stars');
const mouth       = document.getElementById('mouth');
const eyeL        = document.getElementById('eye-l');
const eyeR        = document.getElementById('eye-r');
const cheekL      = document.getElementById('cheek-l');
const cheekR      = document.getElementById('cheek-r');
const dirt        = document.getElementById('dirt');
const moodText    = document.getElementById('mood-text');
const warningText = document.getElementById('warning-text');
const bodyEl      = document.getElementById('body');

// ── Draggable sponge ─────────────────────────────────────────────────────────
let dragging = false;
let dragOffX = 0, dragOffY = 0;

// Home position (bottom-right of stage, absolute within #stage)
const SPONGE_HOME = { right: 4, bottom: 28 };

function spongeHome() {
    sponge.style.left   = '';
    sponge.style.top    = '';
    sponge.style.right  = SPONGE_HOME.right + 'px';
    sponge.style.bottom = SPONGE_HOME.bottom + 'px';
    sponge.classList.remove('dragging', 'on-potato');
}

function showSponge(v) {
    sponge.style.visibility = (v && !state.isDead && !state.hasWon) ? 'visible' : 'hidden';
}

sponge.addEventListener('mousedown', e => {
    if (state.isDead || state.hasWon) return;
    e.preventDefault();
    dragging = true;
    const rect = sponge.getBoundingClientRect();
    dragOffX = e.clientX - rect.left;
    dragOffY = e.clientY - rect.top;
    // switch to absolute left/top positioning for free movement
    const stageRect = document.getElementById('stage').getBoundingClientRect();
    sponge.style.right  = '';
    sponge.style.bottom = '';
    sponge.style.left   = (rect.left - stageRect.left) + 'px';
    sponge.style.top    = (rect.top  - stageRect.top)  + 'px';
    sponge.classList.add('dragging');
});

document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const stageRect = document.getElementById('stage').getBoundingClientRect();
    sponge.style.left = (e.clientX - stageRect.left - dragOffX) + 'px';
    sponge.style.top  = (e.clientY - stageRect.top  - dragOffY) + 'px';

    // check overlap with potato
    const sRect = sponge.getBoundingClientRect();
    const pRect = potatoWrap.getBoundingClientRect();
    const overlap = !(sRect.right < pRect.left || sRect.left > pRect.right ||
                      sRect.bottom < pRect.top  || sRect.top  > pRect.bottom);
    sponge.classList.toggle('on-potato', overlap);
    if (overlap) state.scrubbing = true;
});

document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    spongeHome();
});

// ── Pet ──────────────────────────────────────────────────────────────────────
function pet(e) {
    if (state.isDead || state.hasWon || state.petCooldown > 0) return;
    state.attn += 18;
    state.petCooldown = 4;

    // squish animation
    potatoWrap.classList.remove('squish');
    void potatoWrap.offsetWidth; // reflow to restart
    potatoWrap.classList.add('squish');

    // floating +18
    spawnFloaty(e.clientX, e.clientY, '+18', '#e91e8c');

    // hearts burst
    const hearts = ['💛','❤️','💕','✨'];
    for (let i = 0; i < 3; i++) {
        setTimeout(() => {
            const h = document.createElement('div');
            h.className = 'heart-pop';
            h.innerText = hearts[Math.floor(Math.random() * hearts.length)];
            const ox = (Math.random() - 0.5) * 60;
            h.style.left  = (e.clientX + ox) + 'px';
            h.style.top   = e.clientY + 'px';
            h.style.setProperty('--drift', (Math.random()-0.5)*40 + 'px');
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 850);
        }, i * 80);
    }

    // small burst dots
    spawnBurst(e.clientX, e.clientY, 8, ['#ffb6c1','#ffd700','#ff69b4','#fff176']);
}

// ── Feed ─────────────────────────────────────────────────────────────────────
function doFeed(e, type) {
    e.stopPropagation();
    if (state.isDead || state.hasWon || state.foodCooldowns[type] > 0) return;
    const f = FOODS[type];
    state.hunger = Math.min(state.hunger + f.restore, 150);
    state.foodCooldowns[type] = f.cooldown;
    const r = e.currentTarget.getBoundingClientRect();
    const cx = r.left + r.width / 2, cy = r.top;
    spawnFloaty(cx, cy, f.emoji + ' +' + f.restore, '#e67e22');
    spawnBurst(cx, cy + 20, 10, ['#ffd700','#e67e22','#fff176','#ffb347']);

    // feed squish too
    potatoWrap.classList.remove('squish');
    void potatoWrap.offsetWidth;
    potatoWrap.classList.add('squish');
}

// ── Burst helper ─────────────────────────────────────────────────────────────
function spawnBurst(x, y, count, colors) {
    for (let i = 0; i < count; i++) {
        const b = document.createElement('div');
        b.className = 'burst-dot';
        const angle = (i / count) * Math.PI * 2 + Math.random() * 0.5;
        const dist  = 30 + Math.random() * 50;
        b.style.left   = x + 'px';
        b.style.top    = y + 'px';
        b.style.width  = b.style.height = (4 + Math.random() * 5) + 'px';
        b.style.background = colors[Math.floor(Math.random() * colors.length)];
        b.style.setProperty('--dx', (Math.cos(angle) * dist) + 'px');
        b.style.setProperty('--dy', (Math.sin(angle) * dist) + 'px');
        b.style.animationDuration = (0.5 + Math.random() * 0.25) + 's';
        document.body.appendChild(b);
        setTimeout(() => b.remove(), 800);
    }
}

// ── Floaty text ──────────────────────────────────────────────────────────────
function spawnFloaty(x, y, text, color) {
    const el = document.createElement('div');
    el.className = 'floaty';
    el.innerText = text;
    el.style.left  = (x - 22) + 'px';
    el.style.top   = (y - 10) + 'px';
    el.style.color = color || '#333';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1000);
}

// ── Unlock system ────────────────────────────────────────────────────────────
function applyUnlocks(lvl) {
    const items = LEVEL_UNLOCKS[lvl];
    if (!items) return;
    const names = [];
    items.forEach(item => {
        if (state.unlockedIds.includes(item.id)) return;
        state.unlockedIds.push(item.id);
        names.push(item.label);
        if (item.type === 'food') {
            const btn = document.getElementById('btn-' + (item.id === 'burger' ? 'burger' : 'pizza'));
            if (btn) btn.style.display = 'block';
        }
        if (item.type === 'brush') {
            state.brushTier = item.tier;
            sponge.classList.remove('gold-brush', 'power-wash');
            if (item.tier === 1) sponge.classList.add('gold-brush');
            if (item.tier === 2) sponge.classList.add('power-wash');
        }
        if (item.type === 'cosmetic' && item.id === 'sunglass') {
            state.sunglassesOn = true;
            document.getElementById('acc-sunglasses').style.display = 'block';
        }
        const list = document.getElementById('unlocks-list');
        if (list.querySelector('span[style]')) list.innerHTML = '';
        const chip = document.createElement('span');
        chip.className = 'unlock-chip';
        chip.innerText = item.label;
        list.appendChild(chip);
    });
    if (names.length > 0) {
        const b = document.getElementById('unlock-banner');
        b.innerText = '🔓 UNLOCKED: ' + names.join(' · ');
        b.style.display = 'block';
        clearTimeout(b._t);
        b._t = setTimeout(() => { b.style.display = 'none'; }, 3500);
    }
}

// ── Sweat drops management ────────────────────────────────────────────────────
let sweatEl = null;
function setSweat(on) {
    if (on && !sweatEl) {
        sweatEl = document.createElement('div');
        sweatEl.className = 'sweat';
        sweatEl.innerText = '💧';
        document.getElementById('potato-wrap').appendChild(sweatEl);
    } else if (!on && sweatEl) {
        sweatEl.remove();
        sweatEl = null;
    }
}

// ── Tick ─────────────────────────────────────────────────────────────────────
function tick() {
    if (state.isDead || state.hasWon) return;

    if (state.petCooldown > 0) state.petCooldown--;
    Object.keys(state.foodCooldowns).forEach(k => { if (state.foodCooldowns[k] > 0) state.foodCooldowns[k]--; });

    state.attn    -= DECAY_ATTN;
    state.hunger  -= DECAY_HUNGER;
    state.hygiene -= DECAY_HYGIENE;

    if (state.scrubbing) state.hygiene = Math.min(state.hygiene + BRUSH_TIERS[state.brushTier].restore, 100);
    state.scrubbing = false;

    if (state.hunger  > 120) state.attn -= 0.5;
    if (state.hygiene < 30)  state.attn -= 0.4;

    state.attn    = Math.max(0,   Math.min(state.attn,   100));
    state.hunger  = Math.max(-30, Math.min(state.hunger, 150));
    state.hygiene = Math.max(0,   Math.min(state.hygiene,100));

    const inZone = state.attn >= 30 && state.attn <= 70 && state.hunger > 0;
    if (inZone) state.xp += 0.3;

    if (state.lvl < 5 && state.xp >= XP_PER_LVL[state.lvl]) {
        state.lvl++;
        applyUnlocks(state.lvl);
        spawnBurst(window.innerWidth/2, window.innerHeight/2, 20, ['#f1c40f','#e67e22','#2ecc71','#3498db','#ff69b4']);
        spawnFloaty(window.innerWidth/2, window.innerHeight/2 - 60, '🎉 LEVEL UP!', '#f1c40f');
    }

    if (state.lvl === 5) {
        document.getElementById('content-row').style.display = 'flex';
        state.elderTicks++;
        if (state.elderTicks >= WIN_TICKS) { win(); return; }
    }

    if (state.attn > 70) {
        state.panicTicks++;
        if (state.panicTicks >= PANIC_LIMIT) { runAway(); return; }
    } else {
        state.panicTicks = Math.max(0, state.panicTicks - SOOTHE_RATE);
    }

    if (state.attn < 30) {
        state.madTicks++;
        if (state.madTicks >= MAD_LIMIT) { explode(); return; }
    } else {
        state.madTicks = Math.max(0, state.madTicks - SOOTHE_RATE);
    }

    if (state.hunger <= -20 || state.hygiene <= 0) { die(); return; }

    render();
}

// ── Render ───────────────────────────────────────────────────────────────────
function render() {
    // Size grows with level
    const sz = 150 + (state.lvl - 1) * 22;
    potatoWrap.style.width  = sz + 'px';
    potatoWrap.style.height = sz + 'px';

    // Shadow scales with size and squishes with panic
    const shadowW = sz * 0.65;
    potatoShad.style.width   = shadowW + 'px';
    potatoShad.style.opacity = state.isDead ? '0.1' : '0.4';

    // Stage accessories
    STAGE_ACC.forEach((id, i) => {
        document.getElementById(id).style.display = (i === state.lvl - 1) ? 'block' : 'none';
    });
    document.getElementById('acc-sunglasses').style.display = state.sunglassesOn ? 'block' : 'none';

    document.getElementById('val-age').innerText = AGES[state.lvl - 1];
    document.getElementById('val-lvl').innerText = state.lvl + '/5';
    document.getElementById('val-xp').innerText  = state.lvl < 5
        ? Math.floor(state.xp) + '/' + XP_PER_LVL[state.lvl]
        : '★ MAX';

    // Gauges
    document.getElementById('fill-attn').style.width    = state.attn    + '%';
    document.getElementById('fill-hunger').style.width  = Math.max(0, (state.hunger / 150) * 100) + '%';
    document.getElementById('fill-hygiene').style.width = state.hygiene + '%';
    document.getElementById('fill-content').style.width = (state.elderTicks / WIN_TICKS * 100) + '%';
    if (state.lvl === 5) {
        const secsLeft = Math.ceil((WIN_TICKS - state.elderTicks) / 10);
        document.getElementById('elder-timer').innerText = secsLeft + 's';
    }

    const hp = state.hunger / 150;
    document.getElementById('fill-hunger').style.background =
        hp < 0.2 ? '#e74c3c' : hp > 0.8 ? '#9b59b6' : '#e67e22';

    // Attention bar color + label
    const attnFill  = document.getElementById('fill-attn');
    const attnLabel = document.getElementById('attn-label');
    if (state.attn < 30) {
        attnFill.style.background = '#e74c3c';
        attnLabel.innerText = 'RAGE'; attnLabel.style.color = '#e74c3c';
    } else if (state.attn <= 70) {
        attnFill.style.background = '#2ecc71';
        attnLabel.innerText = 'CONTENT'; attnLabel.style.color = '#27ae60';
    } else {
        attnFill.style.background = '#8e44ad';
        attnLabel.innerText = 'PANIC'; attnLabel.style.color = '#8e44ad';
    }

    dirt.style.opacity = Math.max(0, (100 - state.hygiene) / 100) * 0.8;

    // Food button cooldowns
    Object.keys(FOODS).forEach(type => {
        const btn = document.getElementById('btn-' + type);
        if (!btn || btn.style.display === 'none') return;
        const f   = FOODS[type];
        const sec = Math.ceil(state.foodCooldowns[type] / 10);
        btn.innerText = sec > 0 ? f.emoji + ' ' + sec + 's' : f.emoji + ' ' + f.label;
        btn.disabled  = sec > 0;
    });

    document.getElementById('hint').innerText =
        'CLICK to pet · DRAG 🧽 to wash · FEED to eat';

    // Warnings — hunger/hygiene take priority when not in panic/rage danger
    if (state.panicTicks > 30) {
        warningText.innerText = '⚠️ GONNA RUN IN ' + Math.ceil((PANIC_LIMIT - state.panicTicks) / 10) + 's!';
    } else if (state.madTicks > 30) {
        warningText.innerText = '💢 GONNA EXPLODE IN ' + Math.ceil((MAD_LIMIT - state.madTicks) / 10) + 's!';
    } else if (state.hunger < 10) {
        const secsLeft = Math.ceil((state.hunger + 20) / (DECAY_HUNGER * 10));
        warningText.innerText = '🍟 STARVING!! FEED ME IN ~' + Math.max(0, secsLeft) + 's!';
    } else if (state.hunger < 30) {
        warningText.innerText = '🍟 SO HUNGRY... FEED ME!';
    } else if (state.hygiene < 10) {
        warningText.innerText = '🧼 TOO FILTHY!! WASH ME!!';
    } else if (state.hygiene < 25) {
        warningText.innerText = '🧼 I\'M SO DIRTY...';
    } else {
        warningText.innerText = '';
    }

    // Sweat drops when panic building
    setSweat(state.panicTicks > 40);

    // Mood states — animation class on wrap, face changes on SVG internals
    // Remove squish from class list but preserve it if mid-animation
    const isSquishing = potatoWrap.classList.contains('squish');

    if (state.attn < 30) {
        moodText.innerText = state.hunger < 20 ? 'I\'M STARVING AND IGNORED!!' : (state.attn < 15 ? 'NEEDS YOU NOW!!' : 'IGNORING ME?! PET ME!');
        moodText.style.color = '#e74c3c';
        brows.style.display = 'block';
        mouth.setAttribute('d', 'M88 178 Q110 160 132 178');
        eyeL.setAttribute('fill','#c0392b'); eyeR.setAttribute('fill','#c0392b');
        cheekL.setAttribute('opacity','0'); cheekR.setAttribute('opacity','0');
        if (!isSquishing) potatoWrap.className = '';
    } else if (state.attn <= 70) {
        if (state.hunger < 20) {
            moodText.innerText = 'PLEASE... FEED ME...';
            moodText.style.color = '#e67e22';
            brows.style.display = 'none';
            mouth.setAttribute('d', 'M88 178 Q110 165 132 178');
            eyeL.setAttribute('fill','#c0392b'); eyeR.setAttribute('fill','#c0392b');
            cheekL.setAttribute('opacity','0'); cheekR.setAttribute('opacity','0');
            if (!isSquishing) potatoWrap.className = '';
        } else if (state.hygiene < 15) {
            moodText.innerText = 'I SMELL TERRIBLE...';
            moodText.style.color = '#7f8c8d';
            brows.style.display = 'none';
            mouth.setAttribute('d', 'M88 175 Q110 163 132 175');
            eyeL.setAttribute('fill','#7f8c8d'); eyeR.setAttribute('fill','#7f8c8d');
            cheekL.setAttribute('opacity','0'); cheekR.setAttribute('opacity','0');
            if (!isSquishing) potatoWrap.className = '';
        } else {
            moodText.innerText = state.lvl === 5 ? 'ELDER POTATO IS CONTENT.' : 'JUST ENOUGH ATTENTION!';
            moodText.style.color = '#27ae60';
            brows.style.display = 'none';
            mouth.setAttribute('d', 'M88 170 Q110 192 132 170');
            eyeL.setAttribute('fill','#3a2a1a'); eyeR.setAttribute('fill','#3a2a1a');
            cheekL.setAttribute('opacity','0.7'); cheekR.setAttribute('opacity','0.7');
            if (!isSquishing) potatoWrap.className = 'mood-wiggle';
        }
    } else {
        moodText.innerText = 'TOO MUCH!! SCREEAAAAM!!';
        moodText.style.color = '#8e44ad';
        brows.style.display = 'none';
        mouth.setAttribute('d', 'M98 158 A14 20 0 1 0 122 158 A14 20 0 1 0 98 158');
        eyeL.setAttribute('fill','#8e44ad'); eyeR.setAttribute('fill','#8e44ad');
        cheekL.setAttribute('opacity','0'); cheekR.setAttribute('opacity','0');
        if (!isSquishing) potatoWrap.className = 'mood-panic';
    }

    mouth.setAttribute('stroke', state.hygiene < 20 ? '#e74c3c' : '#5d4037');
}

// ── End states ────────────────────────────────────────────────────────────────
function hideAllFoodBtns() {
    ['fries','burger','pizza'].forEach(t => document.getElementById('btn-'+t).style.display = 'none');
    document.getElementById('btn-reset').style.display = 'block';
}

function runAway() {
    state.isDead = true; dragging = false; showSponge(false); spongeHome(); setSweat(false);
    potatoWrap.className = '';
    potatoWrap.style.transition = 'transform 1.6s ease-in, opacity 1.6s ease-in';
    potatoWrap.style.transform  = 'translateX(650px) rotate(55deg)';
    potatoWrap.style.opacity    = '0';
    setTimeout(() => {
        showOverlay('🏃 YOUR POTATO RAN AWAY!', 'Too much attention! He screamed himself right off the screen. Keep him in the green zone!');
        hideAllFoodBtns();
    }, 1700);
}

function explode() {
    state.isDead = true; dragging = false; showSponge(false); spongeHome(); setSweat(false);
    potatoWrap.className = '';
    let f = 0;
    const iv = setInterval(() => {
        potatoWrap.style.transform = f%2===0 ? 'scale(1.45)' : 'scale(0.8)';
        bodyEl.setAttribute('fill', f%2===0 ? '#e74c3c' : '#c0392b');
        f++;
        if (f > 8) {
            clearInterval(iv);
            potatoWrap.style.opacity = '0';
            const emojis = ['💥','🟤','✨','🍟','💢','🔥'];
            for (let i = 0; i < 14; i++) {
                setTimeout(() => spawnBurst(
                    window.innerWidth/2  + (Math.random()-.5)*80,
                    window.innerHeight/2 + (Math.random()-.5)*80,
                    1, [emojis[Math.floor(Math.random()*emojis.length)]]
                ), i * 60);
                setTimeout(() => spawnFloaty(
                    window.innerWidth/2  + (Math.random()-.5)*200,
                    window.innerHeight/2 + (Math.random()-.5)*200,
                    emojis[Math.floor(Math.random()*emojis.length)], '#e74c3c'
                ), i * 60);
            }
            setTimeout(() => {
                showOverlay('💥 YOUR POTATO EXPLODED!', 'Ignored for too long — he detonated. Pet him before the rage builds!');
                hideAllFoodBtns();
            }, 1000);
        }
    }, 100);
}

function die() {
    state.isDead = true; dragging = false; showSponge(false); spongeHome(); setSweat(false);
    document.getElementById('eyes').innerHTML =
        '<circle cx="85" cy="130" r="20" fill="white" opacity="0.5"/>' +
        '<circle cx="135" cy="130" r="20" fill="white" opacity="0.5"/>' +
        '<text x="72" y="140" font-size="26" fill="#999">✕</text>' +
        '<text x="122" y="140" font-size="26" fill="#999">✕</text>';
    bodyEl.setAttribute('fill','#c8c8c8');
    bodyEl.setAttribute('stroke','#aaa');
    halo.style.display = 'block';
    potatoWrap.className = '';
    showOverlay('🪦 REST IN POTATO CHIPS.', 'Your potato starved or became too filthy. Keep him fed and clean!');
    hideAllFoodBtns();
}

function win() {
    state.hasWon = true; dragging = false; showSponge(false); spongeHome(); setSweat(false);
    bodyEl.setAttribute('fill','#f1c40f');
    bodyEl.setAttribute('stroke','#e67e22');
    stars.style.display = 'block';
    potatoWrap.className = 'mood-ascend';
    moodText.innerText = '🥣 GOLDEN MASH!! 🥣';
    moodText.style.color = '#f1c40f';
    // golden burst
    for (let i = 0; i < 3; i++) {
        setTimeout(() => spawnBurst(
            window.innerWidth/2, window.innerHeight/2,
            20, ['#f1c40f','#fff176','#ffe57f','#ffca28','white']
        ), i * 300);
    }
    showOverlay('🥣✨ GOLDEN MASHED POTATOES! ✨🥣', 'Your Elder Potato survived long enough to achieve his final form. He has been mashed into pure golden glory. You win!');
    hideAllFoodBtns();
}

function showOverlay(title, msg) {
    document.getElementById('overlay-title').innerText = title;
    document.getElementById('overlay-msg').innerText   = msg;
    document.getElementById('overlay').classList.add('show');
}

function resetGame() { location.reload(); }

// ── Start ────────────────────────────────────────────────────────────────────
render();
setInterval(tick, TICK_MS);
</script>
</body>
</html>
